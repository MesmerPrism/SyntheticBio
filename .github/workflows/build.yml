name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: dotnet restore SyntheticBio.sln

      - name: Check formatting
        run: dotnet format SyntheticBio.sln --verify-no-changes --no-restore

      - name: Build
        run: dotnet build SyntheticBio.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test SyntheticBio.sln --no-build --configuration Release --verbosity normal

      - name: Build unsigned Windows package
        run: powershell -ExecutionPolicy Bypass -File .\tools\app\Build-App-Package.ps1 -Unsigned -Version 0.0.0.0

      - name: Publish preview setup bootstrapper
        run: powershell -ExecutionPolicy Bypass -File .\tools\app\Publish-PreviewSetup.ps1 -Version 0.0.0.0

      - name: Upload unsigned Windows package
        uses: actions/upload-artifact@v4
        with:
          name: SyntheticBio-msix-unsigned
          path: artifacts/windows-installer
